# Configuração de rate limiting e headers de segurança para a API

http {
    # ~10 requisições por segundo com burst controlado
    limit_req_zone $binary_remote_addr zone=api_global:10m rate=10r/s;
    # Login mais restrito para evitar brute-force
    limit_req_zone $binary_remote_addr zone=api_login:1m rate=5r/m;

    server {
        location / {
            limit_req zone=api_global burst=20 nodelay;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "same-origin" always;
            add_header Content-Security-Policy "default-src 'none'";
            proxy_pass http://gunicorn_upstream;
        }

        location /auth/login {
            limit_req zone=api_login burst=5 nodelay;
            proxy_pass http://gunicorn_upstream;
        }
    }
}

